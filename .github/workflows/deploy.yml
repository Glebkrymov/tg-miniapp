name: Deploy to Yandex Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: cr.yandex
  BACKEND_IMAGE: cr.yandex/${{ secrets.YC_REGISTRY_ID }}/backend

jobs:
  # ── Тесты ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run backend tests
        run: cd backend && npm test

      - name: TypeScript type check
        run: cd backend && npx tsc --noEmit

  # ── Деплой backend ────────────────────────────────
  deploy-backend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Устанавливаем yc CLI
      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i /opt/yc -n
          echo "/opt/yc/bin" >> $GITHUB_PATH

      # Аутентификация через SA key
      - name: Authenticate with YC
        run: |
          echo '${{ secrets.YC_SA_KEY_JSON }}' > sa-key.json
          yc config set service-account-key sa-key.json
          yc config set folder-id ${{ secrets.YC_FOLDER_ID }}
          rm sa-key.json

      # Получаем IAM токен и логинимся в CR
      - name: Docker login to cr.yandex
        run: |
          IAM_TOKEN=$(yc iam create-token)
          echo "$IAM_TOKEN" | docker login --username iam --password-stdin cr.yandex

      # Build и push Docker-образа
      - name: Build and push backend image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t ${{ env.BACKEND_IMAGE }}:$IMAGE_TAG \
            -t ${{ env.BACKEND_IMAGE }}:latest \
            ./backend
          docker push ${{ env.BACKEND_IMAGE }}:$IMAGE_TAG
          docker push ${{ env.BACKEND_IMAGE }}:latest

      # Деплой в Serverless Container
      - name: Deploy backend to Serverless Container
        run: |
          yc serverless container revision deploy \
            --container-id ${{ secrets.YC_CONTAINER_ID }} \
            --image ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --cores 1 \
            --memory 512MB \
            --concurrency 8 \
            --execution-timeout 30s \
            --service-account-id ${{ secrets.YC_SERVICE_ACCOUNT_ID }} \
            --secret environment-variable=BOT_TOKEN,id=${{ secrets.YC_LOCKBOX_SECRET_ID }},version-id=latest,key=BOT_TOKEN \
            --secret environment-variable=POYO_API_KEY,id=${{ secrets.YC_LOCKBOX_SECRET_ID }},version-id=latest,key=POYO_API_KEY \
            --secret environment-variable=DATABASE_URL,id=${{ secrets.YC_LOCKBOX_SECRET_ID }},version-id=latest,key=DATABASE_URL \
            --secret environment-variable=REDIS_URL,id=${{ secrets.YC_LOCKBOX_SECRET_ID }},version-id=latest,key=REDIS_URL \
            --secret environment-variable=JWT_SECRET,id=${{ secrets.YC_LOCKBOX_SECRET_ID }},version-id=latest,key=JWT_SECRET

  # ── Деплой frontend ───────────────────────────────
  deploy-frontend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_API_URL: ${{ secrets.BACKEND_URL }}

      # Загрузка в Object Storage через AWS CLI (S3-совместимый API)
      - name: Deploy frontend to Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_SA_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SA_SECRET_KEY }}
          AWS_DEFAULT_REGION: ru-central1
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.YC_FRONTEND_BUCKET }} \
            --endpoint-url https://storage.yandexcloud.net \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # index.html без кэша (SPA)
          aws s3 cp frontend/dist/index.html s3://${{ secrets.YC_FRONTEND_BUCKET }}/index.html \
            --endpoint-url https://storage.yandexcloud.net \
            --cache-control "no-cache, no-store, must-revalidate"
