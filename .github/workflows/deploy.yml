name: Deploy to Yandex Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: cr.yandex
  YC_REGISTRY_ID: crpe96mgh563n9bjh3pm
  YC_CONTAINER_ID: bbaudh491kibs9v9e1s7
  YC_FOLDER_ID: b1gu5a9big59ejguopaj
  YC_FRONTEND_BUCKET: tgapp-frontend
  YC_LOCKBOX_SECRET_ID: e6qh5in7kthgs5gehdee
  YC_SERVICE_ACCOUNT_ID: ajeobnl18j7h1oe5lj0j
  BACKEND_IMAGE: cr.yandex/crpe96mgh563n9bjh3pm/backend
  BACKEND_URL: https://d5dvg4e13p8puqjqse6p.fary004x.apigw.yandexcloud.net

jobs:
  # ── Тесты ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run backend tests
        run: cd backend && npm test

      - name: TypeScript type check
        run: cd backend && npx tsc --noEmit

  # ── Деплой backend ────────────────────────────────
  deploy-backend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Устанавливаем yc CLI
      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i /opt/yc -n
          echo "/opt/yc/bin" >> $GITHUB_PATH

      # Аутентификация через SA key (base64-encoded secret)
      - name: Authenticate with YC
        env:
          SA_KEY_B64: ${{ secrets.YC_SA_KEY_JSON }}
        run: |
          echo "$SA_KEY_B64" | base64 -d > sa-key.json
          yc config set service-account-key sa-key.json
          yc config set folder-id "$YC_FOLDER_ID"
          rm sa-key.json

      # Получаем IAM токен и логинимся в CR
      - name: Docker login to cr.yandex
        run: |
          IAM_TOKEN=$(yc iam create-token)
          echo "$IAM_TOKEN" | docker login --username iam --password-stdin cr.yandex

      # Build и push Docker-образа
      - name: Build and push backend image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            -t $BACKEND_IMAGE:$IMAGE_TAG \
            -t $BACKEND_IMAGE:latest \
            ./backend
          docker push $BACKEND_IMAGE:$IMAGE_TAG
          docker push $BACKEND_IMAGE:latest

      # Получаем актуальный version-id Lockbox секрета
      - name: Get Lockbox secret version
        id: lockbox
        run: |
          VERSION_ID=$(yc lockbox secret list-versions $YC_LOCKBOX_SECRET_ID --format json | jq -r '.[0].id')
          echo "version_id=$VERSION_ID" >> $GITHUB_OUTPUT
          echo "Lockbox version: $VERSION_ID"

      # Деплой в Serverless Container
      - name: Deploy backend to Serverless Container
        run: |
          VID=${{ steps.lockbox.outputs.version_id }}
          yc serverless container revision deploy \
            --container-id $YC_CONTAINER_ID \
            --image $BACKEND_IMAGE:${{ github.sha }} \
            --cores 1 \
            --memory 512MB \
            --concurrency 8 \
            --execution-timeout 30s \
            --service-account-id $YC_SERVICE_ACCOUNT_ID \
            --network-id enps35h0ekl8m5810jmv \
            --environment WEBHOOK_BASE_URL=${{ env.BACKEND_URL }} \
            --secret environment-variable=BOT_TOKEN,id=$YC_LOCKBOX_SECRET_ID,version-id=$VID,key=BOT_TOKEN \
            --secret environment-variable=POYO_API_KEY,id=$YC_LOCKBOX_SECRET_ID,version-id=$VID,key=POYO_API_KEY \
            --secret environment-variable=DATABASE_URL,id=$YC_LOCKBOX_SECRET_ID,version-id=$VID,key=DATABASE_URL \
            --secret environment-variable=REDIS_URL,id=$YC_LOCKBOX_SECRET_ID,version-id=$VID,key=REDIS_URL \
            --secret environment-variable=JWT_SECRET,id=$YC_LOCKBOX_SECRET_ID,version-id=$VID,key=JWT_SECRET \
            --secret environment-variable=WEBAPP_URL,id=$YC_LOCKBOX_SECRET_ID,version-id=$VID,key=WEBAPP_URL \
            --secret environment-variable=YOOKASSA_SHOP_ID,id=$YC_LOCKBOX_SECRET_ID,version-id=$VID,key=YOOKASSA_SHOP_ID \
            --secret environment-variable=YOOKASSA_SECRET_KEY,id=$YC_LOCKBOX_SECRET_ID,version-id=$VID,key=YOOKASSA_SECRET_KEY \
            --secret environment-variable=ALERT_BOT_TOKEN,id=$YC_LOCKBOX_SECRET_ID,version-id=$VID,key=ALERT_BOT_TOKEN \
            --secret environment-variable=ALERT_CHAT_ID,id=$YC_LOCKBOX_SECRET_ID,version-id=$VID,key=ALERT_CHAT_ID

  # ── Деплой frontend ───────────────────────────────
  deploy-frontend:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_API_URL: ${{ env.BACKEND_URL }}

      # Загрузка в Object Storage через AWS CLI (S3-совместимый API)
      - name: Deploy frontend to Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_SA_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SA_SECRET_KEY }}
          AWS_DEFAULT_REGION: ru-central1
        run: |
          aws s3 sync frontend/dist/ s3://$YC_FRONTEND_BUCKET \
            --endpoint-url https://storage.yandexcloud.net \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          aws s3 cp frontend/dist/index.html s3://$YC_FRONTEND_BUCKET/index.html \
            --endpoint-url https://storage.yandexcloud.net \
            --cache-control "no-cache, no-store, must-revalidate"
